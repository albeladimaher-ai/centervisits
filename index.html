<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--bg4:#2a2f45;
  --border:#2e3350;--accent:#4f8ef7;--accent2:#6ee7b7;--accent3:#f59e0b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
}
.wrap{background:var(--bg);min-height:100vh;padding:0 0 40px;color:var(--text)}
.header{background:linear-gradient(135deg,#1e2a4a 0%,#0f1117 100%);padding:24px 24px 20px;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-circle{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0}
.org-name{font-size:13px;color:var(--text2);line-height:1.4}
.org-name strong{display:block;font-size:15px;color:var(--text)}
.title-block{text-align:center;flex:1}
h1{font-size:18px;font-weight:600;color:var(--text);letter-spacing:0.3px}
.subtitle{font-size:12px;color:var(--text3);margin-top:4px}
.meta-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:16px 0 0;padding-top:16px;border-top:1px solid var(--border)}
.meta-field{display:flex;flex-direction:column;gap:4px}
.meta-field label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.meta-field input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;outline:none;width:100%}
.meta-field input:focus{border-color:var(--accent)}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center}
.stat-card .sv{font-size:26px;font-weight:700;line-height:1}
.stat-card .sl{font-size:11px;color:var(--text2);margin-top:4px}
.sv-total{color:var(--accent)}.sv-yes{color:var(--green)}.sv-no{color:var(--red)}
.sv-work{color:var(--accent2)}.sv-nowork{color:var(--yellow)}.sv-fill{color:var(--accent3)}
.sv-pct{font-size:13px;color:var(--text3);display:block;margin-top:2px}
.sections{padding:16px 24px;display:flex;flex-direction:column;gap:16px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.sec-header:hover{background:var(--bg3)}
.sec-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sec-badge{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.sec-badge .filled{color:var(--green);font-weight:600}
.sec-toggle{color:var(--text3);font-size:14px;transition:transform 0.2s}
.sec-toggle.open{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-body.open{display:block}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--bg4)}
th{padding:8px 10px;color:var(--text3);font-weight:500;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:right;padding-right:14px;width:40px}
th.col-item{text-align:right;min-width:200px}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center}
td.item-num{color:var(--text3);font-size:11px;text-align:right;padding-right:14px}
td.item-text{text-align:right;color:var(--text);line-height:1.4}
tr:hover td{background:rgba(79,142,247,0.04)}
tr:last-child td{border-bottom:none}
.radio-group{display:flex;gap:4px;justify-content:center;align-items:center}
.rb{display:inline-flex;align-items:center;gap:3px;cursor:pointer;padding:3px 7px;border-radius:5px;border:1px solid var(--border);font-size:11px;transition:all 0.15s;white-space:nowrap}
.rb input{display:none}
.rb:has(input:checked).yes{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green)}
.rb:has(input:checked).no{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red)}
.rb:has(input:checked).works{background:rgba(110,231,183,0.15);border-color:var(--accent2);color:var(--accent2)}
.rb:has(input:checked).noworks{background:rgba(234,179,8,0.15);border-color:var(--yellow);color:var(--yellow)}
.rb:not(:has(input:checked)){color:var(--text3)}
.rb:hover{border-color:var(--text2)}
.notes-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;width:120px;outline:none}
.notes-input:focus{border-color:var(--accent)}
.count-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;width:70px;text-align:center;outline:none}
.count-input:focus{border-color:var(--accent)}
.footer{padding:16px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.sig-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 20px;text-align:center;min-width:180px}
.sig-block label{font-size:12px;color:var(--text2);display:block;margin-bottom:8px}
.sig-line{border-top:1px dashed var(--border);width:140px;margin:0 auto}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-print{background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-print:hover{border-color:var(--text2)}
.btn-send{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-send:hover{opacity:0.9}
.btn-send svg{width:16px;height:16px}
.progress-wrap{background:var(--bg3);height:4px}
.progress-bar{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s}
.modal-overlay{display:none;min-height:500px;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:520px;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:4px 8px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:var(--text3)}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:6px;font-size:13px;outline:none;width:100%;font-family:inherit;direction:rtl}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.field select option{background:var(--bg3)}
.send-summary{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ss-item{font-size:12px;color:var(--text2)}.ss-item span{color:var(--text);font-weight:600}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text2);padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-cancel:hover{border-color:var(--text2)}
.btn-confirm{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-confirm:hover{opacity:0.9}
.btn-confirm:disabled{opacity:0.5;cursor:not-allowed}
.success-box{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:14px}
.success-box.show{display:flex}
.success-icon{width:60px;height:60px;border-radius:50%;background:rgba(34,197,94,0.15);border:2px solid var(--green);display:flex;align-items:center;justify-content:center}
.success-icon svg{width:28px;height:28px;stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.success-title{font-size:16px;font-weight:600;color:var(--green)}
.success-sub{font-size:13px;color:var(--text2)}
.success-ref{font-size:11px;color:var(--text3);background:var(--bg3);padding:4px 12px;border-radius:5px;font-family:monospace}

.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg4);border-bottom:1px solid var(--border);flex-wrap:wrap}
.bulk-group{display:flex;gap:4px}
.bulk-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.bulk-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all 0.15s}
.bulk-btn:hover{border-color:var(--text2);color:var(--text)}
.bulk-yes:hover{background:rgba(34,197,94,0.15);border-color:var(--green)!important;color:var(--green)!important}
.bulk-no:hover{background:rgba(239,68,68,0.15);border-color:var(--red)!important;color:var(--red)!important}
.bulk-work:hover{background:rgba(110,231,183,0.15);border-color:var(--accent2)!important;color:var(--accent2)!important}
.bulk-nowork:hover{background:rgba(234,179,8,0.15);border-color:var(--yellow)!important;color:var(--yellow)!important}
.bulk-reset:hover{background:rgba(148,163,184,0.1);border-color:var(--text2)!important}
.count-label{color:#fff!important;font-size:12px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
</style>

<div class="wrap">
<div class="header">
  <div class="header-top">
    <div class="logo-area">
      <div class="logo-circle"></div>
      <div class="org-name"><strong>إدارة الخدمات الصحية المساندة</strong>تجمع المدينة المنورة الصحي</div>
    </div>
    <div class="title-block">
      <h1>تقرير الجولة الميدانية للخدمات الصحية المساندة</h1>
      <div class="subtitle">Field Tour Report — Supporting Health Services</div>
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field"><label>اسم المركز</label><input type="text" id="centerName" placeholder="أدخل اسم المركز"></div>
    <div class="meta-field"><label>تاريخ الزيارة</label><input type="date" id="visitDate"></div>
    <div class="meta-field"><label>كاتب التقرير</label><input type="text" id="writer" placeholder="الاسم"></div>
  </div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="stats-bar">
  <div class="stat-card"><div class="sv sv-total" id="st-total">0</div><div class="sl">إجمالي العناصر</div></div>
  <div class="stat-card"><div class="sv sv-fill" id="st-fill">0</div><div class="sl">تم تعبئته<span class="sv-pct" id="st-fill-pct">0%</span></div></div>
  <div class="stat-card"><div class="sv sv-yes" id="st-yes">0</div><div class="sl">متوفر</div></div>
  <div class="stat-card"><div class="sv sv-no" id="st-no">0</div><div class="sl">غير متوفر</div></div>
  <div class="stat-card"><div class="sv sv-work" id="st-work">0</div><div class="sl">تعمل</div></div>
  <div class="stat-card"><div class="sv sv-nowork" id="st-nowork">0</div><div class="sl">لا تعمل</div></div>
</div>

<div class="sections" id="sections"></div>

<div class="footer">
  <div class="sig-block"><label>كاتب التقرير</label><div class="sig-line"></div></div>
  <div class="btn-row">
    <button class="btn-print" onclick="window.print()">طباعة / حفظ PDF</button>
    <button class="btn-send" onclick="sendToExcel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      إرسال التقرير
    </button>
  </div>
  <div class="sig-block"><label>توقيع مدير المركز</label><div class="sig-line"></div></div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>إرسال التقرير</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalForm">
      <div class="modal-body">
        <div class="send-summary" id="sendSummary"></div>
        <div class="field"><label>جهة الإرسال</label>
          <select id="sendTo">
            <option value="">— اختر جهة الإرسال —</option>
            <option>إدارة الخدمات الصحية المساندة</option>
            <option>مدير الشبكة الصحية</option>

            <option>إدارة الجودة</option>
            <option>أخرى</option>
          </select>
        </div>
        <div class="field"><label>البريد الإلكتروني للمستلم</label>
          <input type="email" id="sendEmail" placeholder="example@moh.gov.sa" style="direction:ltr">
        </div>
        <div class="field"><label>طريقة الإرسال</label>
          <select id="sendMethod">
            <option value="email">بريد إلكتروني</option>
            <option value="system">نظام صحتي</option>
            <option value="whatsapp">واتساب</option>
          </select>
        </div>
        <div class="field"><label>ملاحظات إضافية</label>
          <textarea id="sendNotes" placeholder="أي ملاحظات تريد إضافتها عند الإرسال..."></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
        <button class="btn-confirm" id="btnConfirm" onclick="confirmSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          تأكيد الإرسال
        </button>
      </div>
    </div>
    <div class="success-box" id="successBox">
      <div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="success-title">تم إرسال التقرير بنجاح</div>
      <div class="success-sub" id="successMsg"></div>
      <div class="success-ref" id="successRef"></div>
      <button class="btn-confirm" style="margin-top:8px" onclick="closeModal()">إغلاق</button>
    </div>
  </div>
</div>

<script>
const sections=[
  {id:'lab_premarital',title:'خدمات المختبر (فحص ما قبل الزواج)',icon:'🔬',color:'#4f8ef7',
   items:['يتوفر موعد على نظام صحتي','توفر مسار خاص لفحص ما قبل الزواج','تتوفر الخدمة بالمركز من الأحد إلى الخميس خلال ساعات العمل','يتم الاستقبال بدون موعد','يتم طلب إثبات الهوية بالاستقبال','يتم طلب الهوية في نقطة سحب الدم','تتوفر الأنابيب البنفسجية بكميات كافية','تتوفر الأنابيب الصفراء أو الحمراء بكميات كافية','تتوفر تجهيزات حفظ العينات (ثلاجة أو حافظة)','يتم الالتزام بوضع الباركود على العينات','هل تم الاطلاع على التعميم من مقدمي الخدمة','مدير المركز على اطلاع بوجود الخدمة','المدير الطبي على اطلاع بوجود الخدمة','الاستقبال على اطلاع بوجود الخدمة','موظف السحب على اطلاع بوجود الخدمة','توفر QR-Code في منطقة السحب + التثقيف + الاستقبال'],
   countField:{label:'عدد موظفين المختبر',id:'cnt_lab_staff'}},
  {id:'lab_care',title:'خدمات المختبر (مستهدفات نموذج الرعاية)',icon:'🧪',color:'#6ee7b7',
   items:['تتوفر الأنابيب الصفراء أو الحمراء بكميات كافية','تتوفر الأنابيب الرمادية بكميات كافية','تتوفر الأنابيب البنفسجية بكميات كافية','توفر فحص OGTT','يوجد عبوات لجمع عينة البول لفحص Albumin to Creatinine Ratio','توفر Sampler بالمختبر لأخذ عينة البراز لفحص سرطان القولون'],
   countField:{label:'عدد فنيين المختبر',id:'cnt_lab_tech'}},
  {id:'radiology',title:'خدمات الأشعة',icon:'🩻',color:'#a78bfa',
   items:['توفر جهاز أشعة X-Ray','توفر جهاز أشعة سونار','يوجد جهاز ماموجرام','توفر تقني أشعة X-Ray','توفر تقني أشعة للسونار','(مستهدف الرعاية) توفر تقني أشعة ماموجرام','هل جهاز الأشعة مرتبط في نظام Agfa الباكس'],
   countField:{label:'عدد تقنيي الأشعة',id:'cnt_rad_tech'}},
  {id:'sterilization',title:'خدمات التعقيم',icon:'🏥',color:'#f59e0b',
   items:['توفر غرفة للتعقيم','غسالة حرارية','التراسونيك','حوضين مغسلة','مسدس هواء Air gun','مسدس ماء Water gun','طاولات فرز','سلات للغسيل Basket','خزان ماء مركزي (مقطر أو RO)','جهاز بخار سنترال أتوكليف /2','كابينة تجفيف /1','Sealer/2','مكبر بإضاءة للفحص','طاولات فرز وتجميع','حضانة Incubation','أتوكليف محمول للمراكز ذات الضغط المنخفض'],
   countField:{label:'عدد موظفين التعقيم',id:'cnt_ster_staff'}},
  {id:'physiotherapy',title:'خدمات العلاج الطبيعي',icon:'💪',color:'#34d399',
   items:['تتوفر عيادة','يتوفر كادر'],countField:null},
  {id:'health_edu',title:'خدمات التثقيف الصحي',icon:'📋',color:'#f87171',
   items:['يوجد مدرب صحي','يوجد جدولة للمواعيد','يوجد يوزر في منصة رقيم للمدرب الصحي','(مستهدف الرعاية) عكس المعادلة','تتم تعبئة نموذج الاستبيان عن طريق الرابط'],
   countField:null},
];
const state={};let totalItems=0;
function buildSections(){
  const cont=document.getElementById('sections');
  sections.forEach(sec=>{
    totalItems+=sec.items.length;state[sec.id]={};
    const div=document.createElement('div');div.className='section';
    let rows='';
    sec.items.forEach((item,i)=>{
      const nm=sec.id+'_'+i;state[sec.id][i]={avail:'',works:''};
      rows+=`<tr><td class="item-num">${i+1}</td><td class="item-text">${item}</td>
        <td><div class="radio-group">
          <label class="rb yes"><input type="radio" name="${nm}_av" value="yes" onchange="upd('${sec.id}',${i},'avail','yes')"> متوفر</label>
          <label class="rb no"><input type="radio" name="${nm}_av" value="no" onchange="upd('${sec.id}',${i},'avail','no')"> غير متوفر</label>
        </div></td>
        <td><div class="radio-group">
          <label class="rb works"><input type="radio" name="${nm}_wk" value="yes" onchange="upd('${sec.id}',${i},'works','yes')"> تعمل</label>
          <label class="rb noworks"><input type="radio" name="${nm}_wk" value="no" onchange="upd('${sec.id}',${i},'works','no')"> لا تعمل</label>
        </div></td>
        <td><input class="notes-input" type="text" placeholder="ملاحظات..."></td></tr>`;
    });
    let countHtml='';
    if(sec.countField){countHtml=`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg4);border-top:1px solid var(--border)"><span class="count-label">${sec.countField.label}:</span><input class="count-input" type="number" min="0" id="${sec.countField.id}" placeholder="0"></div>`;}
    const bulkBar=`<div class="bulk-bar">
      <span style="font-size:11px;color:var(--text3)">تحديد الكل:</span>
      <div class="bulk-group">
        <button class="bulk-btn bulk-yes" onclick="bulkSet('${sec.id}','avail','yes')">✓ متوفر</button>
        <button class="bulk-btn bulk-no" onclick="bulkSet('${sec.id}','avail','no')">✗ غير متوفر</button>
      </div>
      <div class="bulk-sep"></div>
      <div class="bulk-group">
        <button class="bulk-btn bulk-work" onclick="bulkSet('${sec.id}','works','yes')">⚙ تعمل</button>
        <button class="bulk-btn bulk-nowork" onclick="bulkSet('${sec.id}','works','no')">✗ لا تعمل</button>
      </div>
      <button class="bulk-btn bulk-reset" onclick="bulkReset('${sec.id}')">↺ إعادة</button>
    </div>`;
    div.innerHTML=`
      <div class="sec-header" onclick="toggleSec('${sec.id}')">
        <div class="sec-title">
          <div class="sec-icon" style="background:${sec.color}22;color:${sec.color}">${sec.icon}</div>
          <span>${sec.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="sec-badge"><span class="filled" id="badge_fill_${sec.id}">0</span>/${sec.items.length}</div>
          <div class="sec-toggle" id="toggle_${sec.id}">▼</div>
        </div>
      </div>
      <div class="sec-body open" id="body_${sec.id}">
        ${bulkBar}
        <div class="tbl-wrap"><table>
          <thead><tr><th style="width:36px">م</th><th class="col-item">العنصر</th><th style="width:160px">التوفر</th><th style="width:160px">حالة التشغيل</th><th style="width:130px">ملاحظات</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>${countHtml}
      </div>`;
    cont.appendChild(div);
  });
  document.getElementById('st-total').textContent=totalItems;updateStats();
}
function toggleSec(id){document.getElementById('body_'+id).classList.toggle('open');document.getElementById('toggle_'+id).classList.toggle('open');}
function upd(secId,idx,field,val){state[secId][idx][field]=val;updateStats();}
function bulkSet(secId,field,val){
  const sec=sections.find(s=>s.id===secId);
  if(!sec)return;
  sec.items.forEach((_,i)=>{
    state[secId][i][field]=val;
    const nm=secId+'_'+i;
    const radioName=field==='avail'?nm+'_av':nm+'_wk';
    const radios=document.querySelectorAll(`input[name="${radioName}"]`);
    radios.forEach(r=>{if(r.value===val)r.checked=true;});
  });
  updateStats();
}
function bulkReset(secId){
  const sec=sections.find(s=>s.id===secId);
  if(!sec)return;
  sec.items.forEach((_,i)=>{
    state[secId][i]={avail:'',works:''};
    const nm=secId+'_'+i;
    document.querySelectorAll(`input[name="${nm}_av"], input[name="${nm}_wk"]`).forEach(r=>r.checked=false);
  });
  updateStats();
}
function updateStats(){
  let filled=0,yes=0,no=0,work=0,nowork=0;
  sections.forEach(sec=>{
    let sf=0;
    sec.items.forEach((_,i)=>{const s=state[sec.id][i];if(s.avail!==''){filled++;sf++;}if(s.avail==='yes')yes++;if(s.avail==='no')no++;if(s.works==='yes')work++;if(s.works==='no')nowork++;});
    document.getElementById('badge_fill_'+sec.id).textContent=sf;
  });
  document.getElementById('st-fill').textContent=filled;document.getElementById('st-yes').textContent=yes;
  document.getElementById('st-no').textContent=no;document.getElementById('st-work').textContent=work;document.getElementById('st-nowork').textContent=nowork;
  const pct=totalItems>0?Math.round(filled/totalItems*100):0;
  document.getElementById('st-fill-pct').textContent=pct+'%';document.getElementById('progressBar').style.width=pct+'%';
}
function openSendModal(){
  const center=document.getElementById('centerName').value||'—';
  const date=document.getElementById('visitDate').value||'—';
  const filled=document.getElementById('st-fill').textContent;
  const pct=document.getElementById('st-fill-pct').textContent;
  const yes=document.getElementById('st-yes').textContent;
  const no=document.getElementById('st-no').textContent;
  document.getElementById('sendSummary').innerHTML=`
    <div class="ss-item">المركز: <span>${center}</span></div>
    <div class="ss-item">التاريخ: <span>${date}</span></div>
    <div class="ss-item">نسبة التعبئة: <span>${pct}</span></div>
    <div class="ss-item">العناصر المعبأة: <span>${filled}/${totalItems}</span></div>
    <div class="ss-item">متوفر: <span style="color:var(--green)">${yes}</span></div>
    <div class="ss-item">غير متوفر: <span style="color:var(--red)">${no}</span></div>`;
  document.getElementById('modalForm').style.display='block';
  document.getElementById('successBox').classList.remove('show');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function confirmSend(){
  const to=document.getElementById('sendTo').value;
  const email=document.getElementById('sendEmail').value;
  const method=document.getElementById('sendMethod').value;
  if(!to){alert('يرجى اختيار جهة الإرسال');return;}
  if(!email){alert('يرجى إدخال البريد الإلكتروني');return;}
  const btn=document.getElementById('btnConfirm');btn.disabled=true;btn.textContent='جارٍ الإرسال...';
  setTimeout(()=>{
    const ref='RPT-'+Date.now().toString(36).toUpperCase();
    const center=document.getElementById('centerName').value||'غير محدد';
    const ml={'email':'بريد إلكتروني','system':'نظام صحتي','whatsapp':'واتساب'};
    document.getElementById('successMsg').textContent=`تم إرسال تقرير "${center}" إلى ${to} عبر ${ml[method]||method}`;
    document.getElementById('successRef').textContent='رقم المرجع: '+ref;
    document.getElementById('modalForm').style.display='none';
    document.getElementById('successBox').classList.add('show');
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> تأكيد الإرسال';
  },1500);
}
buildSections();
document.getElementById('visitDate').valueAsDate=new Date();
function sendToExcel(){

  const center = document.getElementById('centerName').value;
  const date   = document.getElementById('visitDate').value;
  const writer = document.getElementById('writer').value;

  if(!center || !date || !writer){
    alert("⚠️ الرجاء تعبئة بيانات الرأس");
    return;
  }

  let rows = [];
  let noteInputs = document.querySelectorAll('.notes-input');
  let noteIndex = 0;

  sections.forEach(sec=>{
    sec.items.forEach((item,i)=>{

      const s = state[sec.id][i] || {};
      const note = noteInputs[noteIndex]?.value || '';
      noteIndex++;

      rows.push({
        'اسم المركز': center,
        'التاريخ': date,
        'الكاتب': writer,
        'اسم العنصر': item,
        'متوفر': s.avail === 'yes' ? 'متوفر' : s.avail === 'no' ? 'غير متوفر' : '',
        'التشغيل': s.works === 'yes' ? 'تعمل' : s.works === 'no' ? 'لا تعمل' : '',
        'ملاحظات': note
      });

    });

    // إضافة العدادات
    if(sec.countField){
      const val = document.getElementById(sec.countField.id)?.value || '';
      if(val){
        rows.push({
          'اسم المركز': center,
          'التاريخ': date,
          'الكاتب': writer,
          'اسم العنصر': sec.countField.label,
          'متوفر': val,
          'التشغيل': '',
          'ملاحظات': 'عدد'
        });
      }
    }

  });

  // إظهار رسالة فورية
  const sendBtn = document.querySelector('.btn-send');
  const origText = sendBtn.innerHTML;
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<div class="spinner"></div> جارٍ الإرسال...';

  fetch("https://script.google.com/macros/s/AKfycbyltqAHAbJ6oXAdvb1ChfWF1bVBJNcVi_y0kDzgj29MvIReaAO4GPsOcUp-oo6oXPM-/exec", {
  method: "POST",
  mode: "no-cors",
  headers: {
    "Content-Type": "text/plain"
  },
  body: JSON.stringify({rows: rows})
})
.then(() => {
  sendBtn.innerHTML = '✅ تم الإرسال بنجاح';
  sendBtn.style.background = 'var(--green)';
  setTimeout(() => {
    sendBtn.disabled = false;
    sendBtn.innerHTML = origText;
    sendBtn.style.background = '';
  }, 3000);
})
.catch(err => {
  sendBtn.disabled = false;
  sendBtn.innerHTML = origText;
  alert("❌ فشل الإرسال: " + err.message);
  console.error(err);
});

} // ✅ إغلاق الدالة

</script>
